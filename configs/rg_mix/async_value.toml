# Four-role RG-Mix run: policy inference, policy trainer, value trainer, and
# value evaluator each receive a dedicated node. Override dataset_path and
# Slurm settings for the target cluster.

max_steps = 50
seq_len = 8192

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "rgmix-async-value"
name = "tether-k8"

[slurm]
job_name = "rgmix-async-value"

[ckpt]
interval = 10

[orchestrator]
batch_size = 256
group_size = 8
max_inflight_rollouts = 256

[orchestrator.algo]
type = "grpo"

[orchestrator.algo.baseline]
type = "tether"
group = "leave_one_out"
alpha = 0.5
rho = 0.8
schedule = "linear"
reward_range = [0.0, 1.0]

[orchestrator.train.sampling]
temperature = 1.0
max_completion_tokens = 6144
extra_body = { top_k = -1, min_p = 0.0 }

[[orchestrator.train.env]]
id = "rg-mix"
name = "rg-mix"
args = { dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100, seed = 42 }

[orchestrator.renderer]
name = "default"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"

[trainer.optim]
lr = 1e-6

[value_function]
gamma = 1.0
gae_lambda = 1.0
updates_per_batch = 2
warmup_updates = 10

[value_function.loss]
type = "classification"
reward_range = [0.0, 1.0]
num_bins = 2

[value_function.optim]
type = "adamw"
lr = 5e-5
weight_decay = 0.01
max_norm = 1.0

[value_function.scheduler]
type = "constant"

[value_function.ckpt]
interval = 10
keep_last = 2

[value_function.evaluator]
max_batch_tokens = 32768
batch_wait_ms = 2.0

[deployment]
type = "multi_node"
gpus_per_node = 4
num_infer_nodes = 1
num_train_nodes = 1
num_value_train_nodes = 1
num_value_eval_nodes = 1

[inference.model]
max_model_len = 8192

[inference.parallel]
dp = 4
tp = 1
