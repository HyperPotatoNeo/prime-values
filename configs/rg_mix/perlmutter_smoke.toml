# Short four-node Perlmutter validation for the async value-function topology.
# Compose after async_value.toml and pass --dry-run to inspect the generated
# Slurm script before allocating nodes.

max_steps = 1
seq_len = 8192

[wandb]
project = "rgmix-async-value"
name = "tether-perlmutter-smoke"

[slurm]
job_name = "rgmix-value-smoke"
project_dir = "/pscratch/sd/s/siddart2/prime-rl-async-value-functions-codex"
account = "m5017_g"
partition = ""
constraint = "gpu"
qos = "premium"
time = "01:00:00"
cleanup_grace_period = 0

[trainer]

[orchestrator]
batch_size = 8
group_size = 2
max_inflight_rollouts = 16

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "rg-mix"
name = "rg-mix"
args = { dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 100, num_eval_examples = 10, seed = 42 }

[value_function]
updates_per_batch = 1
warmup_updates = 1
max_steps = 3

[value_function.evaluator]
max_batch_tokens = 8192

[inference.model]
max_model_len = 8192

[env_vars]
WANDB_MODE = "offline"
VLLM_NO_USAGE_STATS = "1"
