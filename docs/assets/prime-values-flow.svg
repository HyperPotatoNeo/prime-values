<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Prime Values asynchronous value-function pipeline</title>
  <desc id="desc">Policy inference sends trajectories to the orchestrator. The value evaluator returns versioned values on a separate lane, the policy trainer receives pure-value GAE, and replay feeds targets to the value trainer, which publishes versioned weights back to the evaluator.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .node { fill: #f6f8fa; stroke: #8c959f; stroke-width: 1.5; }
    .node-title { fill: #24292f; font-size: 17px; font-weight: 600; }
    .badge { fill: #8250df; }
    .badge-text { fill: #ffffff; font-size: 13px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .edge { fill: none; stroke: #57606a; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrowhead { fill: #57606a; }
    .label-bg { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    .label { fill: #57606a; font-size: 13px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
    @media (prefers-color-scheme: dark) {
      .node { fill: #161b22; stroke: #6e7681; }
      .node-title { fill: #f0f6fc; }
      .edge { stroke: #8b949e; }
      .arrowhead { fill: #8b949e; }
      .label-bg { fill: #0d1117; stroke: #30363d; }
      .label { fill: #c9d1d9; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path class="arrowhead" d="M0,0 L8,4 L0,8 Z" />
    </marker>
  </defs>

  <!-- Each connection has its own lane. Edges are drawn first so nodes and
       labels remain unobstructed at every rendered width. -->
  <path class="edge" d="M285 91 C325 91 325 225 365 225" />
  <path class="edge" d="M365 265 C325 265 325 411 285 411" />
  <path class="edge" d="M655 220 C735 220 790 91 875 91" />
  <path class="edge" d="M875 119 C795 119 735 250 655 250" />
  <path class="edge" d="M655 280 L875 280" />
  <path class="edge" d="M1015 315 L1015 385" />
  <path class="edge" d="M1155 421 L1170 421 Q1185 421 1185 406 L1185 106 Q1185 91 1170 91 L1155 91" />

  <g transform="translate(282 143)">
    <rect class="label-bg" width="102" height="26" rx="7" />
    <text class="label" x="51" y="13">trajectories</text>
  </g>
  <g transform="translate(264 326)">
    <rect class="label-bg" width="142" height="26" rx="7" />
    <text class="label" x="71" y="13">pure-value GAE</text>
  </g>
  <g transform="translate(735 130)">
    <rect class="label-bg" width="102" height="26" rx="7" />
    <text class="label" x="51" y="13">trajectories</text>
  </g>
  <g transform="translate(720 196)">
    <rect class="label-bg" width="132" height="26" rx="7" />
    <text class="label" x="66" y="13">values + version</text>
  </g>
  <g transform="translate(705 267)">
    <rect class="label-bg" width="122" height="26" rx="7" />
    <text class="label" x="61" y="13">targets via FIFO</text>
  </g>
  <g transform="translate(1171 319) rotate(-90)">
    <rect class="label-bg" width="128" height="26" rx="7" />
    <text class="label" x="64" y="13">versioned weights</text>
  </g>

  <g>
    <rect class="node" x="35" y="55" width="250" height="72" rx="12" />
    <circle class="badge" cx="72" cy="91" r="16" />
    <text class="badge-text" x="72" y="91">P</text>
    <text class="node-title" x="104" y="97">Policy inference</text>
  </g>
  <g>
    <rect class="node" x="365" y="205" width="290" height="80" rx="12" />
    <circle class="badge" cx="405" cy="245" r="16" />
    <text class="badge-text" x="405" y="245">O</text>
    <text class="node-title" x="439" y="251">Orchestrator</text>
  </g>
  <g>
    <rect class="node" x="35" y="375" width="250" height="72" rx="12" />
    <circle class="badge" cx="72" cy="411" r="16" />
    <text class="badge-text" x="72" y="411">P</text>
    <text class="node-title" x="104" y="417">Policy trainer</text>
  </g>
  <g>
    <rect class="node" x="875" y="55" width="280" height="72" rx="12" />
    <circle class="badge" cx="913" cy="91" r="16" />
    <text class="badge-text" x="913" y="91">E</text>
    <text class="node-title" x="945" y="97">Value evaluator</text>
  </g>
  <g>
    <rect class="node" x="875" y="235" width="280" height="80" rx="12" />
    <circle class="badge" cx="915" cy="275" r="16" />
    <text class="badge-text" x="915" y="275">R</text>
    <text class="node-title" x="949" y="281">Replay buffer</text>
  </g>
  <g>
    <rect class="node" x="875" y="385" width="280" height="72" rx="12" />
    <circle class="badge" cx="913" cy="421" r="16" />
    <text class="badge-text" x="913" y="421">V</text>
    <text class="node-title" x="945" y="427">Value trainer</text>
  </g>
</svg>
